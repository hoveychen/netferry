name: NetFerry
options:
  bundleIdPrefix: com.netferry
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  NetFerry:
    type: application
    platform: iOS
    sources:
      - path: NetFerry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netferry.app
        CODE_SIGN_ENTITLEMENTS: NetFerry/NetFerry.entitlements
        INFOPLIST_FILE: NetFerry/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - framework: NetFerryEngine.xcframework
        embed: true
      - target: PacketTunnel

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netferry.app.PacketTunnel
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        INFOPLIST_FILE: PacketTunnel/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - framework: NetFerryEngine.xcframework
        embed: false
