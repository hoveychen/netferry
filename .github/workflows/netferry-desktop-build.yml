name: netferry-desktop-build

on:
  push:
    paths:
      - "netferry-desktop/**"
      - ".github/workflows/netferry-desktop-build.yml"
  pull_request:
    paths:
      - "netferry-desktop/**"
      - ".github/workflows/netferry-desktop-build.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: netferry-desktop
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: netferry-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        run: npm ci

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build sidecar
        run: python scripts/build_sidecar.py --target ${{ matrix.rust_target }}

      - name: Build frontend
        run: npm run build

      - name: Build tauri bundle
        run: npm run tauri build -- --target ${{ matrix.rust_target }}
