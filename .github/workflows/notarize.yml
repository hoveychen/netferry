name: notarize

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to notarize (e.g. v0.1.2)'
        required: true

jobs:
  notarize:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            stable_name: NetFerry_macos_silicon
          - os: macos-latest
            stable_name: NetFerry_macos_intel
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Download DMG from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ inputs.tag }} \
            --repo ${{ github.repository }} \
            --pattern "${{ matrix.stable_name }}_*.dmg" \
            --dir .
          VERSIONED=$(ls ${{ matrix.stable_name }}_*.dmg | head -1)
          echo "VERSIONED_DMG=$VERSIONED" >> $GITHUB_ENV

      - name: Notarize and staple
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          # Write the API key .p8 file for notarytool
          API_KEY_PATH=$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8
          echo -n "$APPLE_API_KEY" | base64 --decode -o "$API_KEY_PATH"

          echo "=== DMG file info ==="
          ls -la "$VERSIONED_DMG"
          file "$VERSIONED_DMG"
          codesign -dvvv --strict "$VERSIONED_DMG" 2>&1 || echo "(DMG itself may not be signed, checking contents...)"

          echo "=== Mounting DMG to inspect contents ==="
          MOUNT_DIR=$(hdiutil attach "$VERSIONED_DMG" -nobrowse | tail -1 | awk '{print $NF}')
          echo "Mounted at: $MOUNT_DIR"
          ls -laR "$MOUNT_DIR"
          APP_PATH=$(find "$MOUNT_DIR" -name "*.app" -maxdepth 2 | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "=== App bundle signature ==="
            codesign -dvvv --strict "$APP_PATH" 2>&1 || true
            echo "=== Verify deep signature ==="
            codesign --verify --deep --strict --verbose=4 "$APP_PATH" 2>&1 || true
            echo "=== Check entitlements ==="
            codesign -d --entitlements - "$APP_PATH" 2>&1 || true
            echo "=== Spctl assessment ==="
            spctl --assess --type execute --verbose=4 "$APP_PATH" 2>&1 || true
          fi
          hdiutil detach "$MOUNT_DIR" || true

          echo "=== Submitting to notary service ==="
          xcrun notarytool submit "$VERSIONED_DMG" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --output-format json | tee /tmp/notarize_result.json || true

          SUBMISSION_ID=$(cat /tmp/notarize_result.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)
          STATUS=$(cat /tmp/notarize_result.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || true)

          echo "=== Submission ID: $SUBMISSION_ID ==="
          echo "=== Status: $STATUS ==="

          if [ -n "$SUBMISSION_ID" ]; then
            echo "=== Fetching notarization log ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              /tmp/notarize_log.json 2>&1 || true
            echo "=== Notarization log ==="
            cat /tmp/notarize_log.json 2>/dev/null || echo "No log available"
          fi

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            exit 1
          fi

          xcrun stapler staple "$VERSIONED_DMG"
          echo "=== Staple verification ==="
          xcrun stapler validate "$VERSIONED_DMG"
          cp "$VERSIONED_DMG" "${{ matrix.stable_name }}.dmg"

      - name: Upload notarized DMGs back to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ inputs.tag }} \
            --repo ${{ github.repository }} \
            --clobber \
            "$VERSIONED_DMG" "${{ matrix.stable_name }}.dmg"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
