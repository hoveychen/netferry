name: notarize

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to notarize (e.g. v0.1.2)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to notarize (e.g. v0.1.2)'
        required: true

jobs:
  notarize:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            stable_name: NetFerry_macos_silicon
          - os: macos-latest
            stable_name: NetFerry_macos_intel
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Download PKG from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ inputs.tag }} \
            --repo ${{ github.repository }} \
            --pattern "${{ matrix.stable_name }}_*.pkg" \
            --dir .
          VERSIONED=$(ls ${{ matrix.stable_name }}_*.pkg | head -1)
          echo "VERSIONED_PKG=$VERSIONED" >> $GITHUB_ENV

      - name: Notarize and staple
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          API_KEY_PATH=$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8
          echo -n "$APPLE_API_KEY" | base64 --decode -o "$API_KEY_PATH"

          echo "=== PKG file info ==="
          ls -la "$VERSIONED_PKG"
          file "$VERSIONED_PKG"
          pkgutil --check-signature "$VERSIONED_PKG" 2>&1 || true

          echo "=== Submitting to notary service ==="
          xcrun notarytool submit "$VERSIONED_PKG" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --output-format json | tee /tmp/notarize_result.json || true

          SUBMISSION_ID=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" < /tmp/notarize_result.json 2>/dev/null || true)
          STATUS=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" < /tmp/notarize_result.json 2>/dev/null || true)

          echo "=== Submission ID: $SUBMISSION_ID ==="
          echo "=== Status: $STATUS ==="

          if [ -n "$SUBMISSION_ID" ]; then
            echo "=== Fetching notarization log ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              /tmp/notarize_log.json 2>&1 || true
            echo "=== Notarization log ==="
            cat /tmp/notarize_log.json 2>/dev/null || echo "No log available"
          fi

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            exit 1
          fi

          xcrun stapler staple "$VERSIONED_PKG"
          echo "=== Staple verification ==="
          xcrun stapler validate "$VERSIONED_PKG"
          cp "$VERSIONED_PKG" "${{ matrix.stable_name }}.pkg"

      - name: Upload notarized PKGs back to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ inputs.tag }} \
            --repo ${{ github.repository }} \
            --clobber \
            "$VERSIONED_PKG" "${{ matrix.stable_name }}.pkg"
