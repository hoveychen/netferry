name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  # Locate the ci.yml run that built this exact commit. release.yml downloads
  # its artifacts (compiled .app / MSI / APK / tunnel binaries) instead of
  # rebuilding from source.
  wait-for-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      run_id: ${{ steps.find.outputs.run_id }}
    steps:
      # Must match the tag-triggered ci.yml run specifically. A prior
      # main-push run on the same SHA does not have "Set version from tag"
      # applied, so its .app/.apk/.msi carries the dev version (0.1.0).
      - name: Wait for ci.yml on this tag
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          TAG: ${{ github.ref_name }}
        run: |
          for i in $(seq 1 90); do
            run_id=$(gh run list \
              --workflow ci.yml \
              --branch "$TAG" \
              --commit "$SHA" \
              --json databaseId,status,conclusion,headBranch \
              -q '[.[] | select(.status=="completed" and .conclusion=="success" and .headBranch=="'"$TAG"'")] | .[0].databaseId // empty')
            if [ -n "$run_id" ]; then
              echo "Found ci.yml run $run_id (tag=$TAG, sha=$SHA)"
              echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            in_flight=$(gh run list \
              --workflow ci.yml \
              --branch "$TAG" \
              --commit "$SHA" \
              --json status,conclusion,headBranch \
              -q '[.[] | select(.status!="completed" and .headBranch=="'"$TAG"'")] | length')
            failed=$(gh run list \
              --workflow ci.yml \
              --branch "$TAG" \
              --commit "$SHA" \
              --json status,conclusion,headBranch \
              -q '[.[] | select(.status=="completed" and .conclusion!="success" and .headBranch=="'"$TAG"'")] | length')
            echo "Attempt $i: in_flight=$in_flight failed=$failed (no successful tag run yet)"
            sleep 20
          done
          echo "::error::Timed out waiting for ci.yml success on tag $TAG ($SHA)"
          exit 1

  bundle-mac:
    needs: wait-for-ci
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_target: aarch64-apple-darwin
            stable_name: NetFerry_macos_silicon
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            stable_name: NetFerry_macos_intel
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: netferry-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Download desktop artifacts from ci.yml
        uses: actions/download-artifact@v4
        with:
          name: netferry-desktop-${{ matrix.rust_target }}
          path: ../ci-downloaded
          run-id: ${{ needs.wait-for-ci.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Restore .app bundle and helper into expected layout
        run: |
          OUT="src-tauri/target/${{ matrix.rust_target }}/release"
          mkdir -p "$OUT/bundle/macos"
          tar -xf "$GITHUB_WORKSPACE/ci-downloaded/NetFerry.app.tar" \
              -C "$OUT/bundle/macos"
          cp "$GITHUB_WORKSPACE/ci-downloaded/netferry-helper" "$OUT/netferry-helper"
        shell: bash

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Import Apple certificates
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          INSTALLER_CERTIFICATE_PATH=$RUNNER_TEMP/installer_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode -o $INSTALLER_CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $INSTALLER_CERTIFICATE_PATH -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S "apple-tool:,apple:,codesign:,productbuild:" \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          curl -fsSL http://certs.apple.com/devidg2.der -o $RUNNER_TEMP/devidg2.der
          security import $RUNNER_TEMP/devidg2.der -A -t cert -k $KEYCHAIN_PATH || true

          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Inject privileged helper into bundle
        run: |
          APP_PATH="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/NetFerry.app"
          HELPER_DIR="$APP_PATH/Contents/Library/LaunchDaemons"
          mkdir -p "$HELPER_DIR"
          cp "src-tauri/target/${{ matrix.rust_target }}/release/netferry-helper" \
             "$HELPER_DIR/com.hoveychen.netferry.helper"
          cp "src-tauri/com.hoveychen.netferry.helper.plist" \
             "$HELPER_DIR/com.hoveychen.netferry.helper.plist"
          # Tauri bundles all [[bin]] entries into Contents/MacOS/; remove the
          # helper from there since its only home is Contents/Library/LaunchDaemons/.
          rm -f "$APP_PATH/Contents/MacOS/netferry-helper"

      - name: Sign bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/NetFerry.app"

          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" \( -name "*.dylib" -o -name "*.framework" \) \
              | sort -r \
              | xargs -I{} codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" "{}" || true
          fi

          codesign --force --options runtime \
            --entitlements src-tauri/helper-entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH/Contents/Library/LaunchDaemons/com.hoveychen.netferry.helper"

          codesign --force --options runtime \
            --entitlements src-tauri/sidecar-entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH/Contents/MacOS/netferry-tunnel"

          codesign --force --options runtime \
            --entitlements src-tauri/entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH/Contents/MacOS/netferry-desktop"

          codesign --force --options runtime \
            --entitlements src-tauri/entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"

      - name: Create and sign PKG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/NetFerry.app"
          PKG_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle/pkg"
          mkdir -p "$PKG_DIR"

          INSTALLER_ID="${APPLE_INSTALLER_IDENTITY:-${APPLE_SIGNING_IDENTITY/Application/Installer}}"

          pkgbuild \
            --component "$APP_PATH" \
            --install-location /Applications \
            --identifier com.hoveychen.netferry \
            --version "$VERSION" \
            "$PKG_DIR/NetFerry-component.pkg"

          productbuild \
            --package "$PKG_DIR/NetFerry-component.pkg" \
            --sign "$INSTALLER_ID" \
            "$PKG_DIR/${{ matrix.stable_name }}.pkg"
          rm -f "$PKG_DIR/NetFerry-component.pkg"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Upload signed PKG
        uses: actions/upload-artifact@v4
        with:
          name: netferry-pkg-${{ matrix.rust_target }}
          path: netferry-desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/pkg/${{ matrix.stable_name }}.pkg
          if-no-files-found: error

  sign-android:
    needs: wait-for-ci
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Download APK from ci.yml
        uses: actions/download-artifact@v4
        with:
          name: netferry-android
          path: ./downloaded
          run-id: ${{ needs.wait-for-ci.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Setup Android SDK (apksigner)
        uses: android-actions/setup-android@v3

      - name: Re-sign APK with prod keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KS="$RUNNER_TEMP/release.keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$KS"

          INPUT=$(ls downloaded/*.apk | head -1)
          if [ -z "$INPUT" ]; then
            echo "::error::No APK found in downloaded artifact"
            exit 1
          fi

          BUILDTOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)
          OUT="NetFerry_android_arm64.apk"

          # apksigner replaces any existing signature block; the dev signature
          # baked in during ci.yml is overwritten with the prod keystore here.
          "${BUILDTOOLS}apksigner" sign \
            --ks "$KS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --ks-key-alias netferry \
            --out "$OUT" \
            "$INPUT"

          "${BUILDTOOLS}apksigner" verify --verbose "$OUT"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: netferry-android-signed
          path: NetFerry_android_arm64.apk
          if-no-files-found: error

  publish:
    needs: [wait-for-ci, bundle-mac, sign-android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download signed PKGs and APK from this run
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: netferry-pkg-*

      - name: Download signed APK from this run
        uses: actions/download-artifact@v4
        with:
          name: netferry-android-signed
          path: release-artifacts/netferry-android-signed

      - name: Download MSI and tunnel CLI from ci.yml
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: netferry-tunnel-linux-*
          run-id: ${{ needs.wait-for-ci.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download Windows MSI from ci.yml
        uses: actions/download-artifact@v4
        with:
          name: netferry-desktop-x86_64-pc-windows-msvc
          path: release-artifacts/netferry-desktop-x86_64-pc-windows-msvc
          run-id: ${{ needs.wait-for-ci.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Collect stable-name release files
        run: |
          mkdir -p release-final
          cp release-artifacts/netferry-pkg-aarch64-apple-darwin/NetFerry_macos_silicon.pkg release-final/
          cp release-artifacts/netferry-pkg-x86_64-apple-darwin/NetFerry_macos_intel.pkg release-final/
          cp release-artifacts/netferry-tunnel-linux-amd64/netferry-tunnel-linux-amd64 release-final/
          cp release-artifacts/netferry-tunnel-linux-arm64/netferry-tunnel-linux-arm64 release-final/
          cp release-artifacts/netferry-android-signed/NetFerry_android_arm64.apk release-final/
          MSI=$(find release-artifacts/netferry-desktop-x86_64-pc-windows-msvc -name '*.msi' -type f | head -1)
          cp "$MSI" release-final/NetFerry_windows_x64.msi

      - name: Generate release body with download links
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          base="https://github.com/${REPO}/releases/download/${TAG}"
          cat > release-body.md <<EOF
          ## Downloads

          ### App Installers

          | Platform | Architecture | Download |
          | --- | --- | --- |
          | macOS | Apple Silicon | [NetFerry_macos_silicon.pkg](${base}/NetFerry_macos_silicon.pkg) |
          | macOS | Intel | [NetFerry_macos_intel.pkg](${base}/NetFerry_macos_intel.pkg) |
          | Windows | x64 | [NetFerry_windows_x64.msi](${base}/NetFerry_windows_x64.msi) |

          ### Tunnel CLI (Linux)

          | Platform | Architecture | Download |
          | --- | --- | --- |
          | Linux | x86_64 | [netferry-tunnel-linux-amd64](${base}/netferry-tunnel-linux-amd64) |
          | Linux | ARM64 | [netferry-tunnel-linux-arm64](${base}/netferry-tunnel-linux-arm64) |

          ### Mobile Companion

          | Platform | Architecture | Download |
          | --- | --- | --- |
          | Android | ARM64 | [NetFerry_android_arm64.apk](${base}/NetFerry_android_arm64.apk) |

          Scan the QR code in Desktop → Settings → Mobile to connect.

          ---

          EOF

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: NetFerry ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: release-body.md
          files: release-final/*

  notarize:
    needs: publish
    permissions:
      contents: write
    uses: ./.github/workflows/notarize.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
