name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            bundle_glob: |
              netferry-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundle_glob: |
              netferry-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              netferry-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_glob: |
              netferry-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              netferry-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: netferry-desktop
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: netferry-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: netferry-desktop/src-tauri -> target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install deps
        run: npm ci

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build sidecar
        run: python scripts/build_sidecar.py --target ${{ matrix.rust_target }}

      - name: Build bundle
        run: npm run tauri build -- --target ${{ matrix.rust_target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netferry-${{ matrix.rust_target }}
          path: ${{ matrix.bundle_glob }}

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: NetFerry ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-artifacts/**/*

