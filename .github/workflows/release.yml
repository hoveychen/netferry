name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tunnel-cli:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: netferry-relay/go.mod
          cache-dependency-path: netferry-relay/go.sum

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server binaries (embedded)
        working-directory: netferry-relay
        run: |
          mkdir -p cmd/tunnel/binaries
          for target in "linux/amd64" "linux/arm64" "linux/mipsle" "darwin/amd64" "darwin/arm64"; do
            os="${target%/*}"
            arch="${target#*/}"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags="-X main.Version=${{ steps.version.outputs.version }} -s -w" \
              -o "cmd/tunnel/binaries/server-${os}-${arch}" ./cmd/server
          done

      - name: Build tunnel binary
        working-directory: netferry-relay
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags="-X main.Version=${{ steps.version.outputs.version }} -s -w" \
            -o "netferry-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/tunnel
          chmod +x "netferry-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netferry-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: netferry-relay/netferry-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}

  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_target: aarch64-apple-darwin
            bundle_glob: |
              netferry-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            bundle_glob: |
              netferry-desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundle_glob: |
              netferry-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              netferry-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_glob: |
              netferry-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              netferry-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: netferry-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json && rm package.json.bak
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          sed -i.bak "s/^version = \"[^\"]*\"$/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
        shell: bash

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: netferry-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: netferry-desktop/src-tauri -> target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version-file: netferry-relay/go.mod
          cache-dependency-path: netferry-relay/go.sum

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install deps
        run: npm ci

      - name: Import Apple certificate
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          # codesign: is required in addition to apple-tool:,apple: for codesign tool access
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import Apple Developer ID Certification Authority G2 intermediate cert.
          # Our Developer ID cert is issued by G2, which may be absent from older runner images.
          curl -fsSL http://certs.apple.com/devidg2.der -o $RUNNER_TEMP/devidg2.der
          security import $RUNNER_TEMP/devidg2.der -A -t cert -k $KEYCHAIN_PATH || true

          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build sidecar
        run: python scripts/build_sidecar.py --target ${{ matrix.rust_target }}

      - name: Build bundle (app only, unsigned)
        if: startsWith(matrix.os, 'macos')
        # Do NOT pass APPLE_SIGNING_IDENTITY here. Tauri re-signs all binaries with
        # codesign --force, which would override our custom entitlements on the sidecar
        # and helper (tauri-apps/tauri#7381). We sign everything manually after assembly.
        env:
          NETFERRY_EXPORT_KEY: ${{ secrets.NETFERRY_EXPORT_KEY }}
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles app

      - name: Inject privileged helper into bundle (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          APP_PATH="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/NetFerry.app"
          HELPER_DIR="$APP_PATH/Contents/Library/LaunchDaemons"
          mkdir -p "$HELPER_DIR"
          cp "src-tauri/target/${{ matrix.rust_target }}/release/netferry-helper" \
             "$HELPER_DIR/com.hoveychen.netferry.helper"
          cp "src-tauri/com.hoveychen.netferry.helper.plist" \
             "$HELPER_DIR/com.hoveychen.netferry.helper.plist"
          # Tauri bundles all [[bin]] entries into Contents/MacOS/; remove the
          # helper from there since its only home is Contents/Library/LaunchDaemons/.
          # Leaving it unsigned in MacOS/ would cause codesign to fail on the bundle.
          rm -f "$APP_PATH/Contents/MacOS/netferry-helper"

      - name: Sign bundle (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/NetFerry.app"

          # 1. Sign any frameworks/dylibs first (innermost → outermost)
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" \( -name "*.dylib" -o -name "*.framework" \) \
              | sort -r \
              | xargs -I{} codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" "{}" || true
          fi

          # 2. Sign the privileged helper daemon
          codesign --force --options runtime \
            --entitlements src-tauri/helper-entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH/Contents/Library/LaunchDaemons/com.hoveychen.netferry.helper"

          # 3. Sign the sidecar (network client + server entitlements)
          codesign --force --options runtime \
            --entitlements src-tauri/sidecar-entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH/Contents/MacOS/netferry-tunnel"

          # 4. Sign the main executable
          codesign --force --options runtime \
            --entitlements src-tauri/entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH/Contents/MacOS/netferry-desktop"

          # 5. Sign the .app bundle
          codesign --force --options runtime \
            --entitlements src-tauri/entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"

      - name: Create and sign DMG (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APP_PATH="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/NetFerry.app"
          DMG_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg"
          mkdir -p "$DMG_DIR"

          TMP_SRC=$(mktemp -d)
          cp -R "$APP_PATH" "$TMP_SRC/"
          ln -s /Applications "$TMP_SRC/Applications"

          hdiutil create \
            -volname "NetFerry" \
            -srcfolder "$TMP_SRC" \
            -ov -format UDZO \
            "$DMG_DIR/NetFerry_${VERSION}_bundle.dmg"
          rm -rf "$TMP_SRC"

          codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            "$DMG_DIR/NetFerry_${VERSION}_bundle.dmg"

      - name: Build bundle (non-macOS)
        if: "!startsWith(matrix.os, 'macos')"
        env:
          NETFERRY_EXPORT_KEY: ${{ secrets.NETFERRY_EXPORT_KEY }}
        run: npm run tauri build -- --target ${{ matrix.rust_target }}

      - name: Rename bundle to friendly name
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VERSION="${VERSION//./_}"
          case "${{ matrix.rust_target }}" in
            aarch64-apple-darwin)
              mv src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/NetFerry_*.dmg \
                 src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/NetFerry_macos_silicon_${VERSION}.dmg
              ;;
            x86_64-apple-darwin)
              mv src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/NetFerry_*.dmg \
                 src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/NetFerry_macos_intel_${VERSION}.dmg
              ;;
            x86_64-unknown-linux-gnu)
              mv src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb \
                 src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/NetFerry_linux_x64_${VERSION}.deb
              mv src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage \
                 src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/NetFerry_linux_x64_${VERSION}.AppImage
              ;;
            x86_64-pc-windows-msvc)
              mv src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi \
                 src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/NetFerry_windows_x64_${VERSION}.msi
              mv src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe \
                 src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/NetFerry_windows_x64_${VERSION}.exe
              ;;
          esac
        shell: bash

      - name: Clean up keychain
        if: startsWith(matrix.os, 'macos') && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netferry-${{ matrix.rust_target }}
          path: ${{ matrix.bundle_glob }}

  build-android:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: netferry-relay/go.mod
          cache-dependency-path: netferry-relay/go.sum

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server binaries
        working-directory: netferry-relay
        run: make build-servers

      - name: Copy server binaries for mobile
        run: |
          mkdir -p netferry-relay/mobile/binaries
          cp netferry-relay/cmd/tunnel/binaries/server-linux-amd64 netferry-relay/mobile/binaries/
          cp netferry-relay/cmd/tunnel/binaries/server-linux-arm64 netferry-relay/mobile/binaries/

      - name: Build Go mobile AAR
        working-directory: netferry-relay
        env:
          NETFERRY_EXPORT_KEY: ${{ secrets.NETFERRY_EXPORT_KEY }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
        run: |
          LDFLAGS="-X github.com/hoveychen/netferry/relay/mobile.Version=${{ steps.version.outputs.version }} -s -w"
          if [ -n "$NETFERRY_EXPORT_KEY" ]; then
            LDFLAGS="$LDFLAGS -X github.com/hoveychen/netferry/relay/mobile.ExportKey=$NETFERRY_EXPORT_KEY"
          fi
          gomobile bind \
            -target=android/arm64 \
            -androidapi 26 \
            -ldflags="$LDFLAGS" \
            -o ../netferry-mobile/android/app/libs/netferry-engine.aar \
            ./mobile/

      - name: Build Android APK
        working-directory: netferry-mobile/android
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: netferry-android
          path: netferry-mobile/android/app/build/outputs/apk/release/*.apk

  publish:
    needs: [build, build-tunnel-cli, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Add stable filenames for latest-release URLs
        run: |
          cp "$(find release-artifacts/netferry-aarch64-apple-darwin -name 'NetFerry_macos_silicon_*.dmg' -type f | head -1)" release-artifacts/NetFerry_macos_silicon.dmg
          cp "$(find release-artifacts/netferry-x86_64-apple-darwin -name 'NetFerry_macos_intel_*.dmg' -type f | head -1)" release-artifacts/NetFerry_macos_intel.dmg
          cp "$(find release-artifacts/netferry-x86_64-unknown-linux-gnu -name '*.deb' -type f | head -1)" release-artifacts/NetFerry_linux_x64.deb
          cp "$(find release-artifacts/netferry-x86_64-unknown-linux-gnu -name '*.AppImage' -type f | head -1)" release-artifacts/NetFerry_linux_x64.AppImage
          cp "$(find release-artifacts/netferry-x86_64-pc-windows-msvc -name '*.msi' -type f | head -1)" release-artifacts/NetFerry_windows_x64.msi
          cp "$(find release-artifacts/netferry-x86_64-pc-windows-msvc -name '*.exe' -type f | head -1)" release-artifacts/NetFerry_windows_x64.exe

          # CLI-only tunnel binaries (already have stable names)
          cp release-artifacts/netferry-tunnel-linux-amd64/netferry-tunnel-linux-amd64 release-artifacts/netferry-tunnel-linux-amd64.bin
          cp release-artifacts/netferry-tunnel-linux-arm64/netferry-tunnel-linux-arm64 release-artifacts/netferry-tunnel-linux-arm64.bin
          mv release-artifacts/netferry-tunnel-linux-amd64.bin release-artifacts/netferry-tunnel-linux-amd64
          mv release-artifacts/netferry-tunnel-linux-arm64.bin release-artifacts/netferry-tunnel-linux-arm64

          # Android APK
          cp "$(find release-artifacts/netferry-android -name '*.apk' -type f | head -1)" release-artifacts/NetFerry_android_arm64.apk 2>/dev/null || true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: NetFerry ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-artifacts/**/*

  notarize:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            stable_name: NetFerry_macos_silicon
          - os: macos-latest
            stable_name: NetFerry_macos_intel
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          curl -fsSL http://certs.apple.com/devidg2.der -o $RUNNER_TEMP/devidg2.der
          security import $RUNNER_TEMP/devidg2.der -A -t cert -k $KEYCHAIN_PATH || true

          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Download DMG from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern "${{ matrix.stable_name }}_*.dmg" \
            --dir .
          VERSIONED=$(ls ${{ matrix.stable_name }}_*.dmg | head -1)
          echo "VERSIONED_DMG=$VERSIONED" >> $GITHUB_ENV

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$VERSIONED_DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$VERSIONED_DMG"
          cp "$VERSIONED_DMG" "${{ matrix.stable_name }}.dmg"

      - name: Upload notarized DMGs back to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --clobber \
            "$VERSIONED_DMG" "${{ matrix.stable_name }}.dmg"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
