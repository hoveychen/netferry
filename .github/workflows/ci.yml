name: ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netferry-relay
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: netferry-relay/go.mod
          cache-dependency-path: netferry-relay/go.sum

      - name: Build embedded server binaries
        run: |
          make build-servers
          mkdir -p mobile/binaries
          cp cmd/tunnel/binaries/server-linux-amd64 mobile/binaries/
          cp cmd/tunnel/binaries/server-linux-arm64 mobile/binaries/

      - name: Run unit tests
        run: go test ./...

  build-tunnel-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: netferry-relay/go.mod
          cache-dependency-path: netferry-relay/go.sum

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server binaries (embedded)
        working-directory: netferry-relay
        run: |
          mkdir -p cmd/tunnel/binaries
          for target in "linux/amd64" "linux/arm64" "linux/mipsle" "darwin/amd64" "darwin/arm64"; do
            os="${target%/*}"
            arch="${target#*/}"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags="-X main.Version=${{ steps.version.outputs.version }} -s -w" \
              -o "cmd/tunnel/binaries/server-${os}-${arch}" ./cmd/server
          done

      - name: Build tunnel binary
        working-directory: netferry-relay
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags="-X main.Version=${{ steps.version.outputs.version }} -s -w" \
            -o "netferry-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/tunnel
          chmod +x "netferry-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netferry-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: netferry-relay/netferry-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: ${{ startsWith(github.ref, 'refs/tags/') && 90 || 7 }}

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_target: aarch64-apple-darwin
          - os: macos-latest
            rust_target: x86_64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: netferry-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          BUILD_NUM: ${{ github.run_number }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json && rm package.json.bak
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          sed -i.bak "s/\"bundleVersion\": \"[^\"]*\"/\"bundleVersion\": \"$BUILD_NUM\"/" src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          sed -i.bak "s/^version = \"[^\"]*\"$/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
        shell: bash

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: netferry-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: netferry-desktop/src-tauri -> target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version-file: netferry-relay/go.mod
          cache-dependency-path: netferry-relay/go.sum

      - name: Install deps
        run: npm ci

      - name: Build sidecar
        run: python ../scripts/build_sidecar.py --target ${{ matrix.rust_target }}

      # Do NOT pass APPLE_SIGNING_IDENTITY here. Tauri re-signs all binaries with
      # codesign --force, which would override our custom entitlements on the sidecar
      # and helper (tauri-apps/tauri#7381). release.yml signs everything manually.
      - name: Build bundle (macOS, unsigned .app)
        if: startsWith(matrix.os, 'macos')
        env:
          NETFERRY_EXPORT_KEY: ${{ secrets.NETFERRY_EXPORT_KEY }}
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles app

      - name: Build bundle (Windows, MSI)
        if: matrix.os == 'windows-latest'
        env:
          NETFERRY_EXPORT_KEY: ${{ secrets.NETFERRY_EXPORT_KEY }}
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles msi

      # Tar the .app bundle to preserve symlinks (Frameworks/dylibs) across
      # upload-artifact, which otherwise may flatten them.
      - name: Stage macOS artifacts
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p ../ci-staging
          (cd "src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos" \
            && tar -cf "$GITHUB_WORKSPACE/ci-staging/NetFerry.app.tar" NetFerry.app)
          cp "src-tauri/target/${{ matrix.rust_target }}/release/netferry-helper" \
             "$GITHUB_WORKSPACE/ci-staging/netferry-helper"
        shell: bash

      - name: Stage Windows artifacts
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p ../ci-staging
          cp src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi ../ci-staging/
        shell: bash

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netferry-desktop-${{ matrix.rust_target }}
          path: ci-staging
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/') && 90 || 7 }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: netferry-relay/go.mod
          cache-dependency-path: netferry-relay/go.sum

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server binaries
        working-directory: netferry-relay
        run: make build-servers

      - name: Copy server binaries for mobile
        run: |
          mkdir -p netferry-relay/mobile/binaries
          cp netferry-relay/cmd/tunnel/binaries/server-linux-amd64 netferry-relay/mobile/binaries/
          cp netferry-relay/cmd/tunnel/binaries/server-linux-arm64 netferry-relay/mobile/binaries/

      - name: Build Go mobile AAR
        working-directory: netferry-relay
        env:
          NETFERRY_EXPORT_KEY: ${{ secrets.NETFERRY_EXPORT_KEY }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
        run: |
          LDFLAGS="-X github.com/hoveychen/netferry/relay/mobile.version=${{ steps.version.outputs.version }} -s -w"
          if [ -n "$NETFERRY_EXPORT_KEY" ]; then
            LDFLAGS="$LDFLAGS -X github.com/hoveychen/netferry/relay/mobile.ExportKey=$NETFERRY_EXPORT_KEY"
          fi
          mkdir -p ../netferry-mobile/android/app/libs
          gomobile bind \
            -target=android/arm64 \
            -androidapi 26 \
            -ldflags="$LDFLAGS" \
            -o ../netferry-mobile/android/app/libs/netferry-engine.aar \
            ./mobile/

      # Generate a throwaway dev keystore with the defaults baked into
      # build.gradle.kts. release.yml re-signs the APK with the prod keystore
      # via apksigner before publish, so this signature is just a placeholder.
      - name: Generate dev keystore
        working-directory: netferry-mobile/android/app
        run: |
          keytool -genkeypair \
            -keystore release.keystore \
            -alias netferry \
            -storepass netferry123 \
            -keypass netferry123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=NetFerry Dev, O=NetFerry, C=US"

      - name: Build Android APK (dev-signed)
        working-directory: netferry-mobile/android
        env:
          NETFERRY_VERSION_NAME: ${{ steps.version.outputs.version }}
          NETFERRY_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: netferry-android
          path: netferry-mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/') && 90 || 7 }}
